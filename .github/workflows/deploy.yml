name: Deploy MauDev Website (Astro)

on:
  push:
    branches: [ qa ]
  workflow_dispatch:

concurrency:
  group: maudev-deploy
  cancel-in-progress: false

env:
  VERSION: "01"
  CURRENT_ENV: "test"
  VM_LABEL: "vm-maudev-01-test"
  DEPLOY_DIR: "/root/maudev"
  VM_IP: ${{ secrets.IP }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # VALIDATE SECRETS
      # -------------------------

      - name: Validate required secrets
        env:
          PR_SSH_KEY: ${{ secrets.PR_SSH_KEY }}
          ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
        run: |
          set -euo pipefail

          required=(PR_SSH_KEY VM_IP ASTRO_DB_REMOTE_URL ASTRO_DB_APP_TOKEN)
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      # -------------------------
      # BUILD IMAGE (EXPORT TO VM)
      # -------------------------

      - name: Build Docker image
        env:
          ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}
        run: |
          docker build -t maudev:latest --build-arg ASTRO_DB_REMOTE_URL="$ASTRO_DB_REMOTE_URL" --build-arg ASTRO_DB_APP_TOKEN="$ASTRO_DB_APP_TOKEN" .
      - name: Export Docker image
        run: docker save maudev:latest | gzip > maudev-image.tar.gz

      - name: Prepare remote deploy directory
        run: |
          cat > key.pem <<'EOF'
          ${{ secrets.PR_SSH_KEY }}
          EOF
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem root@${{ env.VM_IP }} "mkdir -p '$DEPLOY_DIR'"

      - name: Create runtime env file
        run: |
          cat > .deploy.env <<EOF
          ASTRO_DB_REMOTE_URL=${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN=${{ secrets.ASTRO_DB_APP_TOKEN }}
          EOF

      - name: Upload deploy assets
        run: |
          chmod 600 key.pem
          scp -o StrictHostKeyChecking=no -i key.pem compose.yml root@${{ env.VM_IP }}:"$DEPLOY_DIR/compose.yml"
          scp -o StrictHostKeyChecking=no -i key.pem maudev-image.tar.gz root@${{ env.VM_IP }}:"$DEPLOY_DIR/maudev-image.tar.gz"
          scp -o StrictHostKeyChecking=no -i key.pem .deploy.env root@${{ env.VM_IP }}:"$DEPLOY_DIR/.env"
          scp -o StrictHostKeyChecking=no -i key.pem -r conf root@${{ env.VM_IP }}:"$DEPLOY_DIR/"

      # -------------------------
      # DEPLOY
      # -------------------------

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem root@${{ env.VM_IP }} << 'ENDSSH'
          set -euo pipefail

          cd /root/maudev

          apt-get update
          apt-get install -y ca-certificates curl jq gzip

          # Install Docker if missing
          if ! command -v docker >/dev/null 2>&1; then
            install -m 0755 -d /etc/apt/keyrings

            curl -fsSL https://download.docker.com/linux/debian/gpg \
              -o /etc/apt/keyrings/docker.asc

            chmod a+r /etc/apt/keyrings/docker.asc

            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
              https://download.docker.com/linux/debian \
              $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list

            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            systemctl enable --now docker || true
          fi

          if ! docker compose version >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker-compose-plugin
          fi

          gunzip -c maudev-image.tar.gz | docker load
          docker compose -f compose.yml up -d

          ENDSSH
